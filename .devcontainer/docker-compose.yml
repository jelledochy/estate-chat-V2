name: estate-chat-stack

services:
  chromadb:
    image: ghcr.io/chroma-core/chroma:0.5.0
    container_name: estate-chromadb
    environment:
      IS_PERSISTENT: "true"
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    container_name: estate-neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}"
      NEO4JLABS_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4jpassword} \"RETURN 1\" || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: estate-api
    working_dir: /workspace
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../:/workspace
    environment:
      CHROMADB_URL: http://chromadb:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8001:8000"
    depends_on:
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    container_name: estate-ui
    working_dir: /workspace
    volumes:
      - ../:/workspace
    environment:
      BACKEND_API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  chromadb_data:
  neo4j_data:
